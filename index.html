<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Redirect</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
      font-family: system-ui, sans-serif;
      color: #fff;
    }

    .spinner {
      width: 38px;
      height: 38px;
      border: 3px solid rgba(255,255,255,.18);
      border-top-color: rgba(255,255,255,.95);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    .tapzone {
      position: fixed;
      inset: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <button class="tapzone" id="tapzone" aria-label="open"></button>

  <script>
    /***********************
     * МЕНЯЕШЬ ТОЛЬКО ЭТУ СТРОКУ
     ***********************/
    const REDIRECT_URL = "https://tinyurl.com/5anrkfam";
    // Примеры:
    // const REDIRECT_URL = "https://t.me/your_channel_name";
    // const REDIRECT_URL = "https://cutt.ly/abc123";

    (() => {
      const tg = window.Telegram?.WebApp;

      // вне Telegram — обычный редирект
      if (!tg) {
        window.location.replace(REDIRECT_URL);
        return;
      }

      tg.ready();

      let started = false;
      let closed = false;

      const closeOnce = () => {
        if (closed) return;
        closed = true;
        try { tg.close(); } catch (_) {}
      };

      const isTelegramLink = (() => {
        try {
          const u = new URL(REDIRECT_URL);
          return u.hostname === "t.me" || u.hostname.endsWith(".t.me");
        } catch (_) {
          return false;
        }
      })();

      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "hidden") {
          closeOnce();
        }
      }, { once: true });

      window.addEventListener("pagehide", closeOnce, { once: true });
      window.addEventListener("blur", () => {
        setTimeout(closeOnce, 250);
      }, { once: true });

      const go = () => {
        if (started) return;
        started = true;

        try {
          if (isTelegramLink) {
            // для прямых t.me — самый нормальный вариант
            tg.openTelegramLink(REDIRECT_URL);
            setTimeout(closeOnce, 120);
          } else {
            // для внешних ссылок (например cutt.ly) — best effort
            tg.openLink(REDIRECT_URL);
            setTimeout(closeOnce, 700);
          }
        } catch (_) {
          window.location.replace(REDIRECT_URL);
        }
      };

      // Автопопытка
      setTimeout(go, 50);

      // И запасной запуск по первому тапу
      document.getElementById("tapzone").addEventListener("click", go, { once: true });
    })();
  </script>
</body>
</html>
