<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Redirect</title>

  <!-- Официальный Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js?60"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .spinner {
      width: 38px;
      height: 38px;
      border: 3px solid rgba(255,255,255,0.18);
      border-top-color: rgba(255,255,255,0.95);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="spinner" aria-hidden="true"></div>

  <script>
    /*********************************
     * МЕНЯЕШЬ ТОЛЬКО ЭТУ СТРОКУ
     *********************************/
    const REDIRECT_URL = "https://t.me/ttsavebot";

    /*********************************
     * Запасной таймер закрытия (мс)
     * 1200 — безопасный компромисс
     *********************************/
    const FALLBACK_CLOSE_MS = 1200;

    (() => {
      const tg = window.Telegram?.WebApp;

      // Если открыли вне Telegram — обычный переход
      if (!tg) {
        window.location.replace(REDIRECT_URL);
        return;
      }

      let closed = false;

      const closeOnce = () => {
        if (closed) return;
        closed = true;
        try {
          tg.close();
        } catch (_) {}
      };

      // Лучший сигнал: Mini App ушёл в фон
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "hidden") {
          closeOnce();
        }
      }, { once: true });

      // Запасной сигнал
      window.addEventListener("pagehide", closeOnce, { once: true });

      try {
        // Telegram рекомендует вызывать ready() как можно раньше
        tg.ready();

        // Открываем только внутреннюю t.me ссылку
        tg.openTelegramLink(REDIRECT_URL);

        // Если hidden/pagehide не пришли — закрываем по таймеру
        setTimeout(closeOnce, FALLBACK_CLOSE_MS);
      } catch (_) {
        // Фолбэк
        window.location.replace(REDIRECT_URL);
      }
    })();
  </script>
</body>
</html>
